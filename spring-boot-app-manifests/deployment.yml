pipeline {
    agent {
        docker {
            image 'rishikantkumar/maven-docker-agent:v1'
            args '--user root -v /var/run/docker.sock:/var/run/docker.sock'
        }
    }

    environment {
        // ==============================
        // Docker Hub Configuration
        // ==============================
        DOCKERHUB_USER = 'rishikantkumar'
        DOCKER_REPO = 'ultimate-cicd'

        // ==============================
        // GitHub Configuration
        // ==============================
        GIT_USER_NAME = 'rishikant0'
        GIT_REPO_NAME = 'java-maven-sonar-argocd-helm-k8s'

        // ==============================
        // SonarQube Configuration
        // ==============================
        SONAR_URL = 'http://54.252.140.131:9000'

        // ==============================
        // Project Paths
        // ==============================
        APP_DIR = 'spring-boot-app'
        DEPLOYMENT_FILE = 'spring-boot-app-manifests/deployment.yml'

        // ==============================
        // Docker Image Configuration
        // ==============================
        DOCKER_IMAGE = "${DOCKERHUB_USER}/${DOCKER_REPO}"
        IMAGE_TAG = "${BUILD_NUMBER}"
    }

    stages {

        // ==========================================
        // Stage 1: Checkout Source Code
        // ==========================================
        stage('Checkout Source Code') {
            steps {
                echo 'Checking out source code...'

                checkout scm

                sh '''
                    echo "Current Git status:"
                    git status --short

                    echo "Current commit:"
                    git rev-parse --short HEAD

                    echo "Repository files:"
                    ls -la
                '''
            }
        }

        // ==========================================
        // Stage 2: Validate Project Structure
        // ==========================================
        stage('Validate Project') {
            steps {
                echo 'Validating project structure...'

                sh '''
                    if [ ! -d "${APP_DIR}" ]; then
                        echo "ERROR: ${APP_DIR} directory not found"
                        exit 1
                    fi

                    if [ ! -f "${APP_DIR}/pom.xml" ]; then
                        echo "ERROR: ${APP_DIR}/pom.xml not found"
                        exit 1
                    fi

                    if [ ! -f "${APP_DIR}/Dockerfile" ]; then
                        echo "ERROR: ${APP_DIR}/Dockerfile not found"
                        exit 1
                    fi

                    if [ ! -f "${DEPLOYMENT_FILE}" ]; then
                        echo "ERROR: ${DEPLOYMENT_FILE} not found"
                        exit 1
                    fi

                    echo "Project structure validation passed"
                '''
            }
        }

        // ==========================================
        // Stage 3: Maven Build and Unit Tests
        // ==========================================
        stage('Maven Build and Unit Test') {
            steps {
                echo 'Building and testing Spring Boot application...'

                sh '''
                    cd "${APP_DIR}"

                    echo "Maven version:"
                    mvn -version

                    echo "Running clean package..."
                    mvn clean package
                '''
            }
        }

        // ==========================================
        // Stage 4: SonarQube Static Analysis
        // ==========================================
        stage('SonarQube Analysis') {
            steps {
                echo 'Running SonarQube analysis...'

                withCredentials([
                    string(
                        credentialsId: 'sonarqube',
                        variable: 'SONAR_AUTH_TOKEN'
                    )
                ]) {
                    sh '''
                        cd "${APP_DIR}"

                        mvn sonar:sonar \
                            -Dsonar.token="${SONAR_AUTH_TOKEN}" \
                            -Dsonar.host.url="${SONAR_URL}"
                    '''
                }
            }
        }

        // ==========================================
        // Stage 5: Build Docker Image
        // ==========================================
        stage('Build Docker Image') {
            steps {
                echo 'Building Docker image...'

                sh '''
                    cd "${APP_DIR}"

                    echo "Building:"
                    echo "${DOCKER_IMAGE}:${IMAGE_TAG}"

                    docker build \
                        -t "${DOCKER_IMAGE}:${IMAGE_TAG}" \
                        -t "${DOCKER_IMAGE}:latest" \
                        .
                '''
            }
        }

        // ==========================================
        // Stage 6: Push Docker Image
        // ==========================================
        stage('Push Docker Image') {
            steps {
                echo 'Pushing Docker image to Docker Hub...'

                withCredentials([
                    usernamePassword(
                        credentialsId: 'docker-cred',
                        usernameVariable: 'DOCKER_USERNAME',
                        passwordVariable: 'DOCKER_PASSWORD'
                    )
                ]) {
                    sh '''
                        echo "${DOCKER_PASSWORD}" | \
                            docker login \
                            -u "${DOCKER_USERNAME}" \
                            --password-stdin

                        echo "Pushing versioned image..."
                        docker push "${DOCKER_IMAGE}:${IMAGE_TAG}"

                        echo "Pushing latest image..."
                        docker push "${DOCKER_IMAGE}:latest"
                    '''
                }
            }
        }

        // ==========================================
        // Stage 7: Update Kubernetes Manifest
        // ==========================================
        stage('Update Kubernetes Manifest') {
            steps {
                echo 'Updating Kubernetes deployment image tag...'

                sh '''
                    echo "Image before update:"
                    grep -n "image:" "${DEPLOYMENT_FILE}" || true

                    sed -i -E \
                        "s#^([[:space:]]*image:[[:space:]]*).+#\\1${DOCKER_IMAGE}:${IMAGE_TAG}#" \
                        "${DEPLOYMENT_FILE}"

                    echo "Image after update:"
                    grep -n "image:" "${DEPLOYMENT_FILE}" || true

                    if ! grep -Fq \
                        "${DOCKER_IMAGE}:${IMAGE_TAG}" \
                        "${DEPLOYMENT_FILE}"; then

                        echo "ERROR: Kubernetes image tag was not updated"
                        exit 1
                    fi

                    echo "Kubernetes manifest updated successfully"
                '''
            }
        }

        // ==========================================
        // Stage 8: Commit Manifest to GitHub
        // ==========================================
        stage('Commit Manifest to GitHub') {
            steps {
                echo 'Committing updated manifest to GitHub...'

                withCredentials([
                    usernamePassword(
                        credentialsId: 'github-cred',
                        usernameVariable: 'GITHUB_USERNAME',
                        passwordVariable: 'GITHUB_TOKEN'
                    )
                ]) {
                    sh '''
                        git config user.email "kumarrishikant660@gmail.com"
                        git config user.name "${GITHUB_USERNAME}"

                        git add "${DEPLOYMENT_FILE}"

                        if git diff --cached --quiet; then
                            echo "No manifest changes to commit"
                            exit 0
                        fi

                        git commit \
                            -m "Update deployment image to build ${BUILD_NUMBER} [skip ci]"

                        echo "Fetching latest main branch..."

                        git fetch \
                            "https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/${GIT_USER_NAME}/${GIT_REPO_NAME}.git" \
                            main

                        echo "Rebasing manifest commit onto latest main..."

                        git rebase FETCH_HEAD

                        echo "Pushing updated manifest..."

                        git push \
                            "https://${GITHUB_USERNAME}:${GITHUB_TOKEN}@github.com/${GIT_USER_NAME}/${GIT_REPO_NAME}.git" \
                            HEAD:main
                    '''
                }
            }
        }
    }

    post {

        success {
            echo """
            ========================================
            CI/CD Pipeline completed successfully
            ========================================

            Build Number:
            ${BUILD_NUMBER}

            Docker Image:
            ${DOCKER_IMAGE}:${IMAGE_TAG}

            Git Repository:
            ${GIT_USER_NAME}/${GIT_REPO_NAME}

            ========================================
            """
        }

        failure {
            echo """
            ========================================
            CI/CD Pipeline failed
            ========================================

            Build Number:
            ${BUILD_NUMBER}

            Check Jenkins Console Output
            for the exact failed stage.

            ========================================
            """
        }

        always {
            sh '''
                docker logout || true
            '''

            echo 'Pipeline execution finished.'
        }
    }
}
